# WOODIVO CMS (admin) — nginx config
#
# This is an internal admin tool, not a public marketing page — it should
# never appear in search results. X-Robots-Tag + a blanket robots.txt
# below both say so, since crawlers respect whichever they see first.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Robots-Tag "noindex, nofollow" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    # React Router client-side routing: any non-file path falls back to
    # index.html so deep links and refreshes (e.g. /products/edit/abc123)
    # don't 404 against nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
