# WOODIVO Public Frontend — nginx config
#
# Assumes this container sits on the same Docker network as the backend
# service, reachable at "backend:4000" (the service name in
# docker-compose.yml). If you're deploying this nginx image outside that
# compose stack — e.g. behind a different reverse proxy, or on a host
# where the backend lives elsewhere — change every `proxy_pass` target
# below to the backend's real address before building/deploying.
#
# This also closes the "reverse-proxy rewrite for sitemap.xml/robots.txt"
# backlog item open since Phase 25: the backend serves these at its own
# root (see backend/src/main.ts), and this file is what makes them
# resolve at the public site's root too.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets (Vite adds a content hash to every filename in
    # dist/assets) are safe to cache aggressively — a new deploy ships new
    # filenames, it never mutates an existing one.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SEO crawlers expect these at the site root; proxied straight through
    # to the backend's own sitemap/robots endpoints (excluded from its
    # api/v1 prefix — see backend/src/main.ts).
    location = /sitemap.xml {
        proxy_pass http://backend:4000/sitemap.xml;
    }

    location = /robots.txt {
        proxy_pass http://backend:4000/robots.txt;
    }

    # Optional: proxy API calls through this origin instead of calling the
    # backend cross-origin directly. Not required — the frontend already
    # talks to VITE_API_BASE_URL directly and the backend's CORS_ORIGINS
    # allows it — but keeping this here means switching to same-origin
    # API calls later is a VITE_API_BASE_URL + uncomment away, not a
    # rebuild-everything change.
    # location /api/ {
    #     proxy_pass http://backend:4000/api/;
    # }

    # React Router client-side routing: any path that isn't a real static
    # file falls back to index.html so deep links (e.g. /products/some-slug)
    # and page refreshes don't 404 against nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
